services:
  postgres:
    image: postgres:16-alpine
    container_name: oneepis-postgres
    environment:
      POSTGRES_DB: oneepis
      POSTGRES_USER: oneepis
      POSTGRES_PASSWORD: oneepis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oneepis -d oneepis"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
