name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: python -m ruff check apps/api
      - run: python -m pytest apps/api/tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm --workspace apps/web run typecheck
      - run: npm --workspace apps/web run lint
      - run: npm --workspace apps/web run build

  contracts-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm ci
      - run: python apps/api/scripts/export_openapi.py
      - run: git diff --exit-code packages/contracts/openapi.json
      - run: npx playwright install --with-deps chromium
      - run: npm --workspace apps/web run test:e2e
