name: CI

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm i -g npm@11.13.0
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install -e "apps/api[dev]"
      - run: npm run check:api

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: oneepis_test
          POSTGRES_USER: oneepis
          POSTGRES_PASSWORD: oneepis
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U oneepis -d oneepis_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm i -g npm@11.13.0
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install -e "apps/api[dev]"
      - run: npm run check:migrations:postgres
        env:
          ONEEPIS_DATABASE_URL: postgresql+psycopg://oneepis:oneepis@localhost:5432/oneepis_test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm i -g npm@11.13.0
      - run: npm ci
      - run: npm run check:web
      - run: npm run check:architecture

  contracts-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm i -g npm@11.13.0
      - run: python -m venv .venv
      - run: .venv/bin/python -m pip install --upgrade pip
      - run: .venv/bin/python -m pip install -e "apps/api[dev]"
      - run: npm ci
      - run: npm run check:contract
      - run: npx playwright install --with-deps chromium
      - run: npm run check:e2e

  security-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm i -g npm@11.13.0
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - name: Secret scan report
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependency review report
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical
      - name: CodeQL init report
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python
        continue-on-error: true
      - name: CodeQL analyze report
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
      - name: OSV npm advisory report
        run: npm run check:npm-advisories
        continue-on-error: true
      - name: pip-audit report
        run: |
          python -m pip install pip-audit
          python -m pip_audit --progress-spinner off
        continue-on-error: true
