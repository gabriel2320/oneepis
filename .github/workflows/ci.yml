name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm run check:api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check:web

  contracts-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm ci
      - run: npm run check:contract
      - run: npx playwright install --with-deps chromium
      - run: npm run check:e2e
