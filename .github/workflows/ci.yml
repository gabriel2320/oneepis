name: CI

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

on:
  pull_request:
  push:
    branches:
      - main

env:
  ONEEPIS_NODE_VERSION: "22"
  ONEEPIS_NPM_VERSION: "11.13.0"
  ONEEPIS_PYTHON_VERSION: "3.12"

jobs:
  ownership:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - run: npm run check:ownership

  api:
    runs-on: ubuntu-latest
    needs: ownership
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ONEEPIS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: npm run check:toolchain
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm run check:api

  web:
    runs-on: ubuntu-latest
    needs: ownership
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
          cache: npm
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ONEEPIS_PYTHON_VERSION }}
      - run: npm run check:toolchain
      - run: npm ci
      - run: npm run check:web

  contracts-e2e:
    runs-on: ubuntu-latest
    needs: ownership
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ONEEPIS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
          cache: npm
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - run: npm run check:toolchain
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm ci
      - run: npm run check:contract
      - run: npx playwright install --with-deps chromium
      - run: npm run check:e2e

  postgres-alembic:
    runs-on: ubuntu-latest
    needs: ownership
    env:
      ONEEPIS_DATABASE_URL: postgresql+psycopg://oneepis:oneepis@localhost:5432/oneepis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ONEEPIS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: npm run check:toolchain
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - name: Prepare local PostgreSQL database
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y postgresql postgresql-client
          fi

          sudo systemctl start postgresql.service || sudo service postgresql start

          sudo -u postgres psql --set ON_ERROR_STOP=1 <<'SQL'
          DROP DATABASE IF EXISTS oneepis;
          DROP ROLE IF EXISTS oneepis;
          CREATE ROLE oneepis WITH LOGIN PASSWORD 'oneepis';
          CREATE DATABASE oneepis OWNER oneepis;
          SQL

          PGPASSWORD=oneepis pg_isready -h localhost -p 5432 -U oneepis -d oneepis
      - name: Alembic upgrade head from empty PostgreSQL
        run: python -m alembic -c apps/api/alembic.ini upgrade head
      - name: Alembic downgrade/upgrade smoke
        run: |
          python -m alembic -c apps/api/alembic.ini downgrade -1
          python -m alembic -c apps/api/alembic.ini upgrade head

  security-report:
    runs-on: ubuntu-latest
    needs: ownership
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.ONEEPIS_NODE_VERSION }}
          cache: npm
      - run: npm i -g npm@${{ env.ONEEPIS_NPM_VERSION }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.ONEEPIS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml
      - run: npm run check:toolchain
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "apps/api[dev]"
      - name: Secret scan report
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dependency review report
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        continue-on-error: true
      - name: CodeQL init report
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript, python
        continue-on-error: true
      - name: CodeQL analyze report
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
      - name: OSV npm advisory high+ gate
        run: npm run check:npm-advisories
      - name: pip-audit report
        run: |
          python -m pip install pip-audit
          python -m pip_audit --progress-spinner off
        continue-on-error: true
